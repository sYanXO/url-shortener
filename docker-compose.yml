version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:///./shortener.db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "main.celery_app", "worker", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_started
      app:
        condition: service_started
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0