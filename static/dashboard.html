<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorty — URL Shortener</title>
  <meta name="description" content="A fast, minimal URL shortener with real-time analytics." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface-2: #1a1a1a;
      --border:    rgba(255,255,255,0.07);
      --border-2:  rgba(255,255,255,0.12);
      --text-1:    #f5f5f5;
      --text-2:    #a1a1a1;
      --text-3:    #6b6b6b;
      --accent:    #f5f5f5;
      --accent-dim: rgba(245,245,245,0.08);
      --danger:    #ff4444;
      --success:   #22c55e;
      --radius:    10px;
      --sidebar-w: 280px;
      --transition: 0.15s ease;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Inter', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* =============================================
       SIDEBAR
    ============================================= */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 20px 0;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--text-1);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { color: var(--bg); }

    .logo-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-1);
    }

    /* Shortener form in sidebar */
    .shorten-section {
      padding: 0 16px;
      flex-shrink: 0;
    }

    .shorten-section label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .url-input-wrap {
      position: relative;
    }

    .url-input-wrap .input-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
      transition: color var(--transition);
    }

    .url-input-wrap:focus-within .input-icon { color: var(--text-2); }

    #url-input {
      width: 100%;
      padding: 9px 10px 9px 34px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      color: var(--text-1);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    #url-input::placeholder { color: var(--text-3); }

    #url-input:focus {
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    #shorten-btn {
      width: 100%;
      padding: 9px;
      background: var(--text-1);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #shorten-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #shorten-btn:active:not(:disabled) { transform: translateY(0); opacity: 0.95; }
    #shorten-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    #shorten-btn.loading .btn-text { display: none; }
    #shorten-btn.loading .btn-spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result box */
    .result-box {
      margin: 10px 16px 0;
      padding: 12px;
      background: rgba(34,197,94,0.06);
      border: 1px solid rgba(34,197,94,0.18);
      border-radius: var(--radius);
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .result-box.show { display: block; }

    .result-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #22c55e;
      margin-bottom: 6px;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-link {
      flex: 1;
      min-width: 0;
      font-size: 13px;
      color: #86efac;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .result-link:hover { text-decoration: underline; }

    .copy-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 7px;
      color: #22c55e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition);
    }

    .copy-btn:hover { background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.35); }
    .copy-btn svg { width: 13px; height: 13px; }

    /* Error box */
    .error-box {
      margin: 8px 16px 0;
      padding: 10px 12px;
      background: rgba(255,68,68,0.06);
      border: 1px solid rgba(255,68,68,0.18);
      border-radius: var(--radius);
      font-size: 12px;
      color: #fca5a5;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .error-box.show { display: block; }

    /* Sidebar nav */
    .sidebar-nav {
      padding: 20px 16px 0;
      flex-shrink: 0;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 0 6px;
      margin-bottom: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--text-2);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      font-size: 13.5px;
      font-weight: 450;
      margin-bottom: 1px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: var(--accent-dim); color: var(--text-1); }
    .nav-item.active { background: var(--accent-dim); color: var(--text-1); }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .footer-text {
      font-size: 11px;
      color: var(--text-3);
      text-align: center;
    }

    /* =============================================
       MAIN CONTENT
    ============================================= */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      height: 52px;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--bg);
    }

    .page-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: none;
      border: 1px solid var(--border-2);
      border-radius: 8px;
      color: var(--text-2);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .refresh-btn:hover { background: var(--accent-dim); color: var(--text-1); }
    .refresh-btn svg { width: 13px; height: 13px; }
    .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }

    /* Content area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

    /* Views */
    .view { display: none; }
    .view.active { display: block; }

    /* =============================================
       STAT CARDS
    ============================================= */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color var(--transition);
    }

    .stat-card:hover { border-color: var(--border-2); }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    /* =============================================
       CHART
    ============================================= */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-3);
    }

    .chart-wrap {
      height: 180px;
      position: relative;
    }

    /* =============================================
       LINKS TABLE
    ============================================= */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .table-card .card-header {
      padding: 18px 20px 0;
      margin-bottom: 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 10px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--accent-dim); }

    tbody td {
      padding: 13px 20px;
      font-size: 13px;
      vertical-align: middle;
    }

    .td-short {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12.5px;
      color: var(--text-1);
    }

    .short-link {
      color: var(--text-1);
      text-decoration: none;
    }

    .short-link:hover { text-decoration: underline; }

    .td-original {
      color: var(--text-2);
      max-width: 300px;
    }

    .td-original span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .td-clicks {
      color: var(--text-1);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .td-date {
      color: var(--text-3);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .td-actions {
      width: 40px;
    }

    .table-copy-btn {
      width: 28px;
      height: 28px;
      background: none;
      border: 1px solid var(--border-2);
      border-radius: 7px;
      color: var(--text-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }

    .table-copy-btn:hover { background: var(--accent-dim); border-color: var(--border-2); color: var(--text-1); }
    .table-copy-btn svg { width: 13px; height: 13px; }

    /* Rank badge */
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      margin-right: 10px;
    }

    .rank-badge.top { background: rgba(245,245,245,0.06); color: var(--text-2); border-color: var(--border-2); }

    /* Empty state */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-3);
      font-size: 13px;
    }

    /* =============================================
       RECENT LINKS VIEW
    ============================================= */
    .recent-grid {
      display: grid;
      gap: 10px;
    }

    .link-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color var(--transition);
      animation: fadeIn 0.2s ease;
    }

    .link-card:hover { border-color: var(--border-2); }

    .link-card-icon {
      width: 34px;
      height: 34px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-3);
    }

    .link-card-icon svg { width: 15px; height: 15px; }

    .link-card-body { flex: 1; min-width: 0; }

    .link-card-short {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      text-decoration: none;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12.5px;
    }

    .link-card-short:hover { text-decoration: underline; }

    .link-card-original {
      font-size: 12px;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .link-card-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .link-card-clicks {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .link-card-clicks svg { width: 12px; height: 12px; }

    /* =============================================
       SKELETON LOADER
    ============================================= */
    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, rgba(255,255,255,0.04) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 768px) {
      .sidebar { width: 100%; height: auto; flex-direction: row; }
      body { flex-direction: column; }
    }
  </style>
</head>
<body>
  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="/" style="display:inline-flex; align-items:center; gap:6px; margin-bottom:24px; color:var(--text-3); text-decoration:none; font-size:13px; font-weight:500; transition:color var(--transition);" onmouseover="this.style.color='var(--text-1)'" onmouseout="this.style.color='var(--text-3)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back to Home
      </a>
      <div class="logo">
        <div class="logo-mark">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>
          </svg>
        </div>
        <span class="logo-name">Analytics</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Views</div>
      <button class="nav-item active" data-view="overview" id="nav-overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        Overview
      </button>
      <button class="nav-item" data-view="links" id="nav-links">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
        </svg>
        All Links
      </button>
    </nav>

    <div class="sidebar-footer">
      <p class="footer-text">Shorty &mdash; Fast URL shortener</p>
    </div>
  </aside>

  <!-- ========== MAIN ========== -->
  <main class="main">
    <div class="topbar">
      <span class="page-title" id="page-title">Overview</span>
      <div class="topbar-actions">
        <button class="refresh-btn" id="refresh-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M8 16H3v5"/>
          </svg>
          Refresh
        </button>
      </div>
    </div>

    <div class="content">

      <!-- ── OVERVIEW VIEW ── -->
      <div class="view active" id="view-overview">

        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Links</div>
            <div class="stat-value skeleton" style="width:60px;height:36px;border-radius:6px" id="stat-links">&nbsp;</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Clicks</div>
            <div class="stat-value skeleton" style="width:60px;height:36px;border-radius:6px" id="stat-clicks">&nbsp;</div>
          </div>
        </div>

        <div class="chart-card">
          <div class="card-header">
            <span class="card-title">Clicks over time</span>
            <span class="card-subtitle">Last 14 days</span>
          </div>
          <div class="chart-wrap">
            <canvas id="clicks-chart"></canvas>
          </div>
        </div>

        <div class="table-card">
          <div class="card-header">
            <span class="card-title">Top Links</span>
            <span class="card-subtitle">Sorted by clicks</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Short</th>
                <th>Destination</th>
                <th>Clicks</th>
                <th>Created</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="top-links-tbody">
              <tr><td colspan="6"><div class="empty-state">Loading…</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ── ALL LINKS VIEW ── -->
      <div class="view" id="view-links">
        <div class="recent-grid" id="recent-grid">
          <div class="empty-state">Loading…</div>
        </div>
      </div>

    </div>
  </main>

  <script>
    // =============================================
    // STATE
    // =============================================
    let allLinks = [];
    let chartInstance = null;
    const origin = window.location.origin;

    // =============================================
    // ELEMENTS
    // =============================================
    const refreshBtn     = document.getElementById('refresh-btn');
    const statLinks      = document.getElementById('stat-links');
    const statClicks     = document.getElementById('stat-clicks');
    const topLinksTbody  = document.getElementById('top-links-tbody');
    const recentGrid     = document.getElementById('recent-grid');
    const pageTitle      = document.getElementById('page-title');

    // =============================================
    // NAVIGATION
    // =============================================
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        btn.classList.add('active');
        const viewId = 'view-' + btn.dataset.view;
        document.getElementById(viewId).classList.add('active');
        pageTitle.textContent = btn.textContent.trim();
      });
    });

    // =============================================
    // FORMAT HELPERS
    // =============================================
    function fmt(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
      return String(n);
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function fmtShortDate(isoDate) {
      const d = new Date(isoDate + 'T00:00:00Z');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
    }

    function truncate(str, max = 50) {
      return str.length > max ? str.slice(0, max) + '…' : str;
    }

    // =============================================
    // COPY HELPER
    // =============================================
    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerHTML;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        setTimeout(() => { btn.innerHTML = original; }, 2000);
      }).catch(() => {});
    }

    // =============================================
    // STATS
    // =============================================
    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        statLinks.classList.remove('skeleton');
        statLinks.style = '';
        statLinks.textContent = fmt(data.total_links);
        statClicks.classList.remove('skeleton');
        statClicks.style = '';
        statClicks.textContent = fmt(data.total_clicks);
      } catch (e) {
        statLinks.textContent = '—';
        statClicks.textContent = '—';
      }
    }

    // =============================================
    // CHART
    // =============================================
    async function loadChart() {
      try {
        const res = await fetch('/api/clicks-over-time?days=14');
        const data = await res.json();
        const labels = data.map(d => fmtShortDate(d.date));
        const values = data.map(d => d.count);

        const ctx = document.getElementById('clicks-chart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              data: values,
              borderColor: 'rgba(245,245,245,0.7)',
              borderWidth: 1.5,
              backgroundColor: 'rgba(245,245,245,0.03)',
              pointRadius: 3,
              pointHoverRadius: 5,
              pointBackgroundColor: 'rgba(245,245,245,0.8)',
              pointBorderColor: 'transparent',
              fill: true,
              tension: 0.35,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1a1a1a',
                borderColor: 'rgba(255,255,255,0.1)',
                borderWidth: 1,
                titleColor: '#a1a1a1',
                bodyColor: '#f5f5f5',
                padding: 10,
                callbacks: {
                  label: ctx => ` ${ctx.parsed.y} click${ctx.parsed.y !== 1 ? 's' : ''}`,
                }
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
                ticks: { color: '#6b6b6b', font: { size: 11 }, maxRotation: 0 }
              },
              y: {
                grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
                ticks: { color: '#6b6b6b', font: { size: 11 }, precision: 0 },
                beginAtZero: true,
              }
            }
          }
        });
      } catch (e) {}
    }

    // =============================================
    // LINKS TABLE (Top Links)
    // =============================================
    function renderTopLinks(links) {
      if (!links.length) {
        topLinksTbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No links yet. Create your first one!</div></td></tr>`;
        return;
      }

      topLinksTbody.innerHTML = links.slice(0, 10).map((l, i) => {
        const shortUrl = origin + '/' + l.short_code;
        const isTop = i < 3;
        return `
          <tr>
            <td><span class="rank-badge ${isTop ? 'top' : ''}">${i + 1}</span></td>
            <td class="td-short"><a href="${shortUrl}" target="_blank" rel="noopener" class="short-link">${l.short_code}</a></td>
            <td class="td-original"><span title="${l.original_url}">${truncate(l.original_url, 52)}</span></td>
            <td class="td-clicks">${fmt(l.click_count)}</td>
            <td class="td-date">${fmtDate(l.created_at)}</td>
            <td class="td-actions">
              <button class="table-copy-btn" title="Copy short link" onclick="copyToClipboard('${shortUrl}', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
              </button>
            </td>
          </tr>`;
      }).join('');
    }

    // =============================================
    // RECENT LINKS CARDS (All Links view)
    // =============================================
    function renderRecentGrid(links) {
      if (!links.length) {
        recentGrid.innerHTML = `<div class="empty-state">No links yet. Create your first one!</div>`;
        return;
      }

      // Sort by created_at descending for the all-links view
      const sorted = [...links].sort((a, b) => {
        if (!a.created_at) return 1;
        if (!b.created_at) return -1;
        return new Date(b.created_at) - new Date(a.created_at);
      });

      recentGrid.innerHTML = sorted.map(l => {
        const shortUrl = origin + '/' + l.short_code;
        return `
          <div class="link-card">
            <div class="link-card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
              </svg>
            </div>
            <div class="link-card-body">
              <a href="${shortUrl}" target="_blank" rel="noopener" class="link-card-short">${shortUrl}</a>
              <div class="link-card-original" title="${l.original_url}">${l.original_url}</div>
            </div>
            <div class="link-card-meta">
              <span class="link-card-clicks">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M13.8 12H3"/>
                </svg>
                ${fmt(l.click_count)}
              </span>
              <button class="table-copy-btn" title="Copy short link" onclick="copyToClipboard('${shortUrl}', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
              </button>
            </div>
          </div>`;
      }).join('');
    }

    // =============================================
    // LOAD ALL DATA
    // =============================================
    async function loadLinks() {
      try {
        const res = await fetch('/api/links?limit=100');
        allLinks = await res.json();
        renderTopLinks(allLinks);
        renderRecentGrid(allLinks);
      } catch (e) {
        topLinksTbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">Failed to load links.</div></td></tr>`;
      }
    }

    async function loadData() {
      await Promise.all([loadStats(), loadChart(), loadLinks()]);
    }

    // =============================================
    // REFRESH BUTTON
    // =============================================
    refreshBtn.addEventListener('click', async () => {
      refreshBtn.classList.add('spinning');
      await loadData();
      setTimeout(() => refreshBtn.classList.remove('spinning'), 600);
    });

    // =============================================
    // INIT
    // =============================================
    loadData();
  </script>
</body>
</html>
