<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorty — URL Shortener</title>
  <meta name="description" content="A fast, minimal URL shortener with real-time analytics." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface-2: #1a1a1a;
      --border:    rgba(255,255,255,0.07);
      --border-2:  rgba(255,255,255,0.12);
      --text-1:    #f5f5f5;
      --text-2:    #a1a1a1;
      --text-3:    #6b6b6b;
      --accent:    #f5f5f5;
      --accent-dim: rgba(245,245,245,0.08);
      --danger:    #ff4444;
      --success:   #22c55e;
      --radius:    10px;
      --transition: 0.15s ease;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Inter', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* =============================================
       TOP RIGHT LINK
    ============================================= */
    .dashboard-link {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: var(--radius);
      transition: color var(--transition), background var(--transition);
    }
    .dashboard-link:hover {
      color: var(--text-1);
      background: var(--surface-2);
    }

    /* =============================================
       MAIN CONTAINER
    ============================================= */
    .container {
      width: 100%;
      max-width: 440px;
      padding: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      background: var(--text-1);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--bg);
      margin-bottom: 16px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text-1);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-3);
    }

    /* =============================================
       FORM
    ============================================= */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .url-input-wrap {
      position: relative;
    }

    .url-input-wrap .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
      transition: color var(--transition);
    }

    .url-input-wrap:focus-within .input-icon { color: var(--text-2); }

    #url-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      color: var(--text-1);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    #url-input::placeholder { color: var(--text-3); }

    #url-input:focus {
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    #shorten-btn {
      width: 100%;
      padding: 12px;
      background: var(--text-1);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
    }

    #shorten-btn:hover { opacity: 0.9; }
    #shorten-btn:active { transform: scale(0.98); }
    #shorten-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Spinner */
    .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    #shorten-btn.loading .btn-text { display: none; }
    #shorten-btn.loading .btn-spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =============================================
       RESULTS & ERRORS
    ============================================= */
    .result-box, .error-box {
      margin-top: 16px;
      border-radius: var(--radius);
      display: none;
      animation: fadeIn 0.3s ease forwards;
    }

    .result-box.show, .error-box.show { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .result-box {
      background: var(--accent-dim);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 16px;
    }

    .result-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--success);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--bg);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .result-link {
      color: var(--text-1);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-link:hover { text-decoration: underline; }

    .copy-btn {
      background: transparent;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition), background var(--transition);
    }
    .copy-btn:hover { color: var(--text-1); background: var(--surface-2); }
    .copy-btn svg { width: 14px; height: 14px; }

    .error-box {
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.2);
      color: var(--danger);
      padding: 12px 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <a href="/dashboard" class="dashboard-link">
    Analytics
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
  </a>

  <div class="container">
    <div class="header">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
        </svg>
      </div>
      <h1 class="title">Shorty</h1>
      <p class="subtitle">Paste a URL. Get a short link.</p>
    </div>

    <div class="input-group">
      <div class="url-input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="url" id="url-input" placeholder="https://example.com/..." autocomplete="off" />
      </div>
      <button id="shorten-btn">
        <span class="btn-text">Create Short Link</span>
        <span class="btn-spinner"></span>
      </button>
    </div>

    <div class="result-box" id="result-box">
      <div class="result-label">Link created</div>
      <div class="result-row">
        <a href="#" id="result-link" target="_blank" rel="noopener" class="result-link"></a>
        <button class="copy-btn" id="copy-btn" title="Copy to clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="error-box" id="error-box"></div>
  </div>

  <script>
    const urlInput = document.getElementById('url-input');
    const shortenBtn = document.getElementById('shorten-btn');
    const resultBox = document.getElementById('result-box');
    const resultLink = document.getElementById('result-link');
    const copyBtn = document.getElementById('copy-btn');
    const errorBox = document.getElementById('error-box');

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerHTML;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        setTimeout(() => { btn.innerHTML = original; }, 2000);
      }).catch(() => {});
    }

    shortenBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) return;

      errorBox.classList.remove('show');
      resultBox.classList.remove('show');
      shortenBtn.classList.add('loading');
      shortenBtn.disabled = true;

      try {
        const res = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ original_url: url }),
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || 'Something went wrong.');

        const shortUrl = location.origin + '/' + data.short_code;
        resultLink.href = shortUrl;
        resultLink.textContent = shortUrl;
        resultBox.classList.add('show');
        urlInput.value = '';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('show');
      } finally {
        shortenBtn.classList.remove('loading');
        shortenBtn.disabled = false;
      }
    });

    urlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenBtn.click();
    });

    copyBtn.addEventListener('click', () => {
      copyToClipboard(resultLink.href, copyBtn);
    });
  </script>
</body>
</html>
